version: '3.8'

services:
  oracle-db:
    image: jruisot1903/nextcloud-sas-antequera:db-v1 #container-registry.oracle.com/database/express:latest
    container_name: oracle-db
    environment:
      - ORACLE_PWD=admin
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

  nextcloud:
    image: jruisot1903/nextcloud-sas-antequera:app-v1
    hostname: MAP02028A13N
    container_name: nextcloud-app
    ports:
      - "8081:80"
    depends_on:
      - oracle-db
    environment:
      - ORACLE_HOST=oracle-db
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
    volumes:
      - nextcloud_data:/var/www/html

volumes:
  oracle_data:
  nextcloud_data:
